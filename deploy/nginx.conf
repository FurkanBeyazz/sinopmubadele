# ============================================================
#  Nginx reverse proxy — sinopmubadele.com -> Next.js (:3000)
#  Kurulum:
#    sudo cp deploy/nginx.conf /etc/nginx/sites-available/sinopmubadele
#    sudo ln -s /etc/nginx/sites-available/sinopmubadele /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#  HTTPS için sonra: sudo certbot --nginx -d sinopmubadele.com -d www.sinopmubadele.com
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name sinopmubadele.com www.sinopmubadele.com;

    # Yüklenen büyük görseller için
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
